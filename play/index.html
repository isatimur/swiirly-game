<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Base href fixes asset resolution when the page is served at /play
         (no trailing slash, via Vercel's cleanUrls). Without this, every
         relative path resolves against / instead of /play/, and every
         asset 404s. -->
    <base href="/play/" />
    <title>Swiirl — Community Park</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root {
        --bg-deep: #1a0f2e;
        --bg-mid: #2a1846;
        --accent: #b892e0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        background: radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep));
        color: #eee6f5;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        /* Kill iOS/Android tap flash + selection rectangles globally — without
           this, every tap on the canvas or on a control flashes a translucent
           highlight, and a long-press selects the emoji glyph. */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* The Phaser canvas should never show a focus ring or selection caret. */
      #game canvas { outline: none; -webkit-user-select: none; user-select: none; }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ---- Portrait nudge ---- */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: #1a0f2e;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        color: #b892e0;
        font-size: 16px;
        text-align: center;
        padding: 40px;
      }
      #rotate-hint .rotate-icon {
        font-size: 52px;
        animation: spin90 1.4s ease-in-out infinite alternate;
      }
      @keyframes spin90 {
        from { transform: rotate(-45deg); }
        to   { transform: rotate(45deg); }
      }
      /* Show only on touch devices in portrait with very limited height */
      @media (pointer: coarse) and (orientation: portrait) and (max-width: 600px) {
        #rotate-hint { display: flex; }
      }

      /* ---- Virtual gamepad (injected by touchControls.js on touch devices) ----
         Sizes scale slightly with viewport min-side so an iPhone SE and iPad Pro
         both get comfortable tap targets without one being a postage stamp on
         the other. --tcSz is clamped between 60 and 92 px.                 */
      :root {
        --tcSz: clamp(60px, 9.5vmin, 92px);
        --tcGap: clamp(8px, 1.6vmin, 14px);
        --tcEdge: clamp(14px, 2.6vmin, 24px);
      }
      #tc {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 200;
      }
      .tc-dpad {
        position: absolute;
        bottom: calc(var(--tcEdge) + env(safe-area-inset-bottom));
        left: var(--tcEdge);
        display: flex;
        gap: var(--tcGap);
        pointer-events: none;
      }
      .tc-btn {
        pointer-events: all;
        width: var(--tcSz); height: var(--tcSz);
        border-radius: 50%;
        background: rgba(255,255,255,0.10);
        border: 2px solid rgba(255,255,255,0.28);
        color: rgba(255,255,255,0.88);
        font-size: calc(var(--tcSz) * 0.36);
        line-height: 1;
        padding: 0;
        display: flex; align-items: center; justify-content: center;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        cursor: pointer;
        transition: background 0.07s, transform 0.07s;
        /* No backdrop-filter — it's the single most expensive CSS prop on
           mobile GPUs, and we have up to 7 of these on-screen at once. */
      }
      .tc-btn:focus,
      .tc-btn:focus-visible { outline: none; }
      .tc-btn.tc-active {
        background: rgba(255,255,255,0.28);
        transform: scale(0.91);
      }
      .tc-down {
        /* Slightly smaller than the L/R thumbs so it sits between/under them
           ergonomically without crowding. */
        width: calc(var(--tcSz) * 0.85);
        height: calc(var(--tcSz) * 0.85);
        align-self: flex-end;
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.22);
      }
      .tc-j {
        position: absolute;
        bottom: calc(var(--tcEdge) + env(safe-area-inset-bottom));
        right: var(--tcEdge);
        width: calc(var(--tcSz) * 1.18);
        height: calc(var(--tcSz) * 1.18);
        background: rgba(184,146,224,0.20);
        border-color: rgba(184,146,224,0.55);
      }
      .tc-j.tc-active {
        background: rgba(184,146,224,0.45);
      }
      .tc-atk {
        position: absolute;
        /* Sit above the jump button on the right side, with a comfy gap. */
        bottom: calc(var(--tcEdge) + var(--tcSz) * 1.18 + var(--tcGap)
                     + env(safe-area-inset-bottom));
        right: calc(var(--tcEdge) + var(--tcSz) * 0.08);
        width: calc(var(--tcSz) * 1.02);
        height: calc(var(--tcSz) * 1.02);
        background: rgba(255,210,74,0.22);
        border-color: rgba(255,210,74,0.62);
        color: #fff8d8;
      }
      .tc-atk.tc-active {
        background: rgba(255,210,74,0.45);
      }
      /* Top-right icon row: mute + pause. Smaller, less visual weight. */
      .tc-top {
        position: absolute;
        top: calc(var(--tcEdge) + env(safe-area-inset-top, 0px));
        right: var(--tcEdge);
        display: flex;
        gap: 10px;
        pointer-events: none;
      }
      .tc-icon {
        pointer-events: all;
        width: 44px; height: 44px;
        border-radius: 50%;
        background: rgba(26, 15, 46, 0.78);
        border: 1.5px solid rgba(255,255,255,0.22);
        color: rgba(255,255,255,0.88);
        font-size: 18px;
        line-height: 1;
        padding: 0;
        display: flex; align-items: center; justify-content: center;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        cursor: pointer;
      }
      .tc-icon:focus,
      .tc-icon:focus-visible { outline: none; }
      .tc-icon:active { transform: scale(0.9); }
      .tc-pause-resume {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
      }
      .tc-pause-resume:focus { outline: none; }
      /* Pause overlay shown while game is paused. */
      .tc-pause-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(10, 6, 22, 0.88);
        z-index: 250;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        color: #eee6f5;
      }
      .tc-pause-overlay.visible { display: flex; }
      .tc-pause-overlay h2 {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 42px; font-weight: 900;
        margin: 0; letter-spacing: 4px;
        color: #fff;
        text-shadow: 0 4px 18px rgba(0,0,0,0.5);
      }
      .tc-pause-resume {
        font-family: system-ui, sans-serif;
        font-size: 16px; font-weight: 700; letter-spacing: 3px;
        padding: 14px 30px;
        border-radius: 999px;
        background: rgba(184, 146, 224, 0.85);
        color: #1a0f2e;
        border: none;
        cursor: pointer;
      }
      /* Smaller buttons in landscape on short screens (avoids heavy game overlap) */
      @media (orientation: landscape) and (max-height: 440px) {
        :root { --tcSz: clamp(54px, 8vmin, 70px); --tcGap: 8px; --tcEdge: 12px; }
      }
      #game canvas {
        max-width: 100%;
        max-height: 100%;
        image-rendering: -webkit-optimize-contrast;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        border-radius: 8px;
      }
      .loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      .loading.hidden { opacity: 0; }
      .loading .dot {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.4; }
        50% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="loading" id="loading"><div class="dot"></div>Loading Swiirl…</div>

    <!-- Portrait nudge — only shown on narrow screens in portrait orientation -->
    <div id="rotate-hint">
      <div class="rotate-icon">⟳</div>
      <p>Rotate your phone to landscape for the best experience</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
