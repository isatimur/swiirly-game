<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Base href fixes asset resolution when the page is served at /play
         (no trailing slash, via Vercel's cleanUrls). Without this, every
         relative path resolves against / instead of /play/, and every
         asset 404s. -->
    <base href="/play/" />
    <title>Swiirl — Community Park</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root {
        --bg-deep: #1a0f2e;
        --bg-mid: #2a1846;
        --accent: #b892e0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        background: radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep));
        color: #eee6f5;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ---- Portrait nudge ---- */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: #1a0f2e;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        color: #b892e0;
        font-size: 16px;
        text-align: center;
        padding: 40px;
      }
      #rotate-hint .rotate-icon {
        font-size: 52px;
        animation: spin90 1.4s ease-in-out infinite alternate;
      }
      @keyframes spin90 {
        from { transform: rotate(-45deg); }
        to   { transform: rotate(45deg); }
      }
      /* Show only on touch devices in portrait with very limited height */
      @media (pointer: coarse) and (orientation: portrait) and (max-width: 600px) {
        #rotate-hint { display: flex; }
      }

      /* ---- Virtual gamepad (injected by touchControls.js on touch devices) ---- */
      #tc {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 200;
      }
      .tc-dpad {
        position: absolute;
        bottom: calc(24px + env(safe-area-inset-bottom));
        left: 20px;
        display: flex;
        gap: 12px;
        pointer-events: none;
      }
      .tc-btn {
        pointer-events: all;
        width: 72px; height: 72px;
        border-radius: 50%;
        background: rgba(255,255,255,0.10);
        border: 2px solid rgba(255,255,255,0.28);
        color: rgba(255,255,255,0.88);
        font-size: 26px;
        line-height: 1;
        display: flex; align-items: center; justify-content: center;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        cursor: pointer;
        /* backdrop-filter gives it depth against the game */
        backdrop-filter: blur(6px) brightness(1.1);
        -webkit-backdrop-filter: blur(6px) brightness(1.1);
        transition: background 0.07s, transform 0.07s;
      }
      .tc-btn.tc-active {
        background: rgba(255,255,255,0.28);
        transform: scale(0.91);
      }
      .tc-j {
        position: absolute;
        bottom: calc(24px + env(safe-area-inset-bottom));
        right: 20px;
        width: 86px; height: 86px;
        background: rgba(184,146,224,0.20);
        border-color: rgba(184,146,224,0.55);
        font-size: 30px;
      }
      .tc-j.tc-active {
        background: rgba(184,146,224,0.45);
      }
      .tc-atk {
        position: absolute;
        bottom: calc(110px + env(safe-area-inset-bottom));
        right: 28px;
        width: 76px; height: 76px;
        background: rgba(255,210,74,0.22);
        border-color: rgba(255,210,74,0.62);
        color: #fff8d8;
        font-size: 28px;
      }
      .tc-atk.tc-active {
        background: rgba(255,210,74,0.45);
      }
      /* Smaller buttons in landscape on short screens (avoids heavy game overlap) */
      @media (orientation: landscape) and (max-height: 440px) {
        .tc-btn       { width: 58px; height: 58px; font-size: 21px; }
        .tc-j         { width: 68px; height: 68px; font-size: 24px; }
        .tc-atk       { width: 62px; height: 62px; font-size: 22px; bottom: calc(80px + env(safe-area-inset-bottom)); right: 18px; }
        .tc-dpad,
        .tc-j         { bottom: calc(10px + env(safe-area-inset-bottom)); }
        .tc-dpad      { left: 14px; gap: 8px; }
        .tc-j         { right: 14px; }
      }
      #game canvas {
        max-width: 100%;
        max-height: 100%;
        image-rendering: -webkit-optimize-contrast;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        border-radius: 8px;
      }
      .loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        font-size: 14px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      .loading.hidden { opacity: 0; }
      .loading .dot {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.4; }
        50% { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="loading" id="loading"><div class="dot"></div>Loading Swiirl…</div>

    <!-- Portrait nudge — only shown on narrow screens in portrait orientation -->
    <div id="rotate-hint">
      <div class="rotate-icon">⟳</div>
      <p>Rotate your phone to landscape for the best experience</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
